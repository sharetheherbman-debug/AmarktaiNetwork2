# ─── AmarktAI Network — Production Nginx Configuration ──────────────────────
#
# Place at: /etc/nginx/sites-available/amarktai
# Enable:   ln -s /etc/nginx/sites-available/amarktai /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
#
# APP_DIR convention: /var/www/amarktai/repo
# Next.js builds to:  /var/www/amarktai/repo/.next/
# Static assets at:   /var/www/amarktai/repo/.next/static/
# Public files at:    /var/www/amarktai/repo/public/
#
# The standalone server (server.js) serves all routes including /_next/static/
# but nginx intercepts /_next/static/ for zero-copy, immutable-cached delivery.
# This eliminates the 404s for CSS/JS/font assets reported in the go-live audit.

upstream amarktai_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or IP
    server_name _;

    # ── Redirect HTTP → HTTPS (uncomment when TLS is configured) ───────────
    # return 301 https://$host$request_uri;

    access_log /var/log/nginx/amarktai_access.log;
    error_log  /var/log/nginx/amarktai_error.log warn;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── /_next/static/* — serve directly from filesystem ───────────────────
    # These are immutable, content-hashed assets built by Next.js.
    # Serving them from disk avoids proxying to Node and eliminates the 404s.
    location /_next/static/ {
        alias /var/www/amarktai/repo/.next/static/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Allow cross-origin requests for fonts/chunks from sub-paths
        add_header Access-Control-Allow-Origin "*";
    }

    # ── /public/* — serve Next.js public directory ──────────────────────────
    # Files in /public are served at the root path by Next.js itself,
    # but we can also serve them directly for performance.
    location ~* ^/(?:favicon\.ico|robots\.txt|sitemap\.xml|Amarktai-logo\.png)$ {
        root /var/www/amarktai/repo/public;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── All other requests → Next.js standalone server ─────────────────────
    location / {
        proxy_pass         http://amarktai_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket / upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;

        # Buffer tuning for streaming responses
        proxy_buffering    off;
        proxy_buffer_size  16k;
    }
}

# ── HTTPS server block (uncomment and configure after obtaining TLS cert) ───
# server {
