# ─── AmarktAI Network — Production Nginx Configuration ──────────────────────
#
# Place at: /etc/nginx/sites-available/amarktai
# Enable:   ln -s /etc/nginx/sites-available/amarktai /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
#
# DEPLOYMENT MODEL (Docker Compose — default):
#   The Next.js app runs inside a Docker container that exposes port 3000.
#   The container's standalone server.js correctly serves /_next/static/ from
#   its internal /app/.next/static directory (copied in by the Dockerfile).
#   nginx MUST NOT use a filesystem alias for /_next/static/ because those
#   files are inside the container, NOT on the host filesystem.  Using alias
#   when the host path does not exist causes 404s for all CSS/JS/font assets,
#   which produces the blank white screen seen in the browser.
#
# DEPLOYMENT MODEL (bare-metal / systemd — alternative):
#   If running server.js directly on the host via systemd, you may swap the
#   proxy_pass block below for the alias block that is shown in the comment,
#   because scripts/deploy.sh copies .next/static to the expected host path.
#   In that case also run deploy.sh to ensure the path exists before reloading.
#
# ROOT CAUSE OF BLANK WHITE SCREEN:
#   alias /var/www/amarktai/repo/.next/static/ does not exist on the host when
#   using Docker.  All /_next/static/* requests returned 404 → no CSS/JS/fonts
#   → white screen.  Fix: proxy_pass to the upstream app on every request.

upstream amarktai_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or IP
    server_name _;

    # ── Redirect HTTP → HTTPS (uncomment when TLS is configured) ───────────
    # return 301 https://$host$request_uri;

    access_log /var/log/nginx/amarktai_access.log;
    error_log  /var/log/nginx/amarktai_error.log warn;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── /_next/static/* — proxy to the app (Docker deployment) ────────────
    # Next.js content-hashed assets (CSS, JS chunks, fonts, media).
    # We proxy to the upstream app instead of using a filesystem alias because
    # in Docker the files live inside the container, not on the host.
    # The standalone server.js (Dockerfile: COPY .next/static ./.next/static)
    # correctly serves these assets; we only add the long-lived cache headers.
    #
    # bare-metal/systemd alternative (uncomment + comment proxy block):
    #   location /_next/static/ {
    #       alias /var/www/amarktai/repo/.next/static/;
    #       expires 1y;
    #       access_log off;
    #       add_header Cache-Control "public, max-age=31536000, immutable";
    #       add_header Access-Control-Allow-Origin "*";
    #   }
    location /_next/static/ {
        proxy_pass         http://amarktai_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # These assets are content-hashed and immutable — cache aggressively.
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── /public files — proxy to the app (Docker deployment) ──────────────
    # Public files (favicon, robots.txt, etc.) live inside the container.
    # Proxy them through the app like all other requests.
    # bare-metal/systemd alternative: use root /var/www/amarktai/repo/public;
    location ~* ^/(?:favicon\.ico|robots\.txt|sitemap\.xml|Amarktai-logo\.png)$ {
        proxy_pass         http://amarktai_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── All other requests → Next.js standalone server ─────────────────────
    location / {
        proxy_pass         http://amarktai_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket / upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;

        # Buffer tuning for streaming responses
        proxy_buffering    off;
        proxy_buffer_size  16k;
    }
}

# ── HTTPS server block (uncomment and configure after obtaining TLS cert) ───
